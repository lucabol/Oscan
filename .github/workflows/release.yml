name: Oscan Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version to package (for example 0.1.0 or v0.1.0)"
        required: true
        type: string
      publish:
        description: "Publish a GitHub release after packaging"
        required: false
        default: false
        type: boolean

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  prepare:
    name: Resolve release metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
      should_publish: ${{ steps.meta.outputs.should_publish }}
      matrix: ${{ steps.meta.outputs.matrix }}
    steps:
      - uses: actions/checkout@v5

      - name: Resolve release version and publish mode
        id: meta
        shell: pwsh
        run: |
          $contractPath = Join-Path $env:GITHUB_WORKSPACE 'packaging/toolchains/release-contract.json'
          $contract = Get-Content $contractPath -Raw | ConvertFrom-Json -AsHashtable
          $eventName = '${{ github.event_name }}'
          $rawVersion = if ($eventName -eq 'workflow_dispatch') { '${{ inputs.version }}' } else { '${{ github.ref_name }}' }
          $rawVersion = $rawVersion.Trim()
          if ([string]::IsNullOrWhiteSpace($rawVersion)) {
            throw 'A release version is required.'
          }

          if ($rawVersion.StartsWith('v')) {
            $tag = $rawVersion
            $version = $rawVersion.Substring(1)
          } else {
            $version = $rawVersion
            $tag = "v$rawVersion"
          }

          if ([string]::IsNullOrWhiteSpace($version)) {
            throw 'Resolved version was empty.'
          }

          $shouldPublish = if ($eventName -eq 'push') { 'true' } elseif ('${{ inputs.publish }}' -eq 'true') { 'true' } else { 'false' }

          $targets = @()
          $targets += $contract['bundled_targets'].Keys
          $targets += $contract['binary_only_targets'].Keys
          $matrixEntries = foreach ($target in ($targets | Sort-Object)) {
            $platform, $arch = $target.Split('-', 2)
            $runner = switch ($platform) {
              'windows' { 'windows-latest' }
              'linux' { 'ubuntu-latest' }
              'macos' { 'macos-15-intel' }
              default { throw "Unsupported platform '$platform' in release contract target '$target'." }
            }
            $labelPlatform = switch ($platform) {
              'windows' { 'Windows' }
              'linux' { 'Linux' }
              'macos' { 'macOS' }
              default { $platform }
            }
            @{
              os = $runner
              label = "$labelPlatform $arch"
              target = $target
              binary_path = if ($platform -eq 'windows') { 'target/release/oscan.exe' } else { 'target/release/oscan' }
            }
          }
          $matrix = @{ include = @($matrixEntries) } | ConvertTo-Json -Compress -Depth 4

          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "should_publish=$shouldPublish" >> $env:GITHUB_OUTPUT
          "matrix=$matrix" >> $env:GITHUB_OUTPUT

  package:
    name: Package ${{ matrix.label }}
    needs: prepare
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      # --- Embedded native-link assets (Windows and Linux x86-64 for now; see
      # docs/design/native-link-embedding.md §1.1/§5.5/§10/§11). These steps
      # must run BEFORE `cargo build --release` so the linker asset set can be
      # embedded into the oscan binary at build time, and BEFORE
      # `assemble-release.ps1` so its own runtime-archive build (with the shim
      # baked in) isn't duplicated.
      # For Linux x86_64, we also fetch and build aarch64/riscv64 toolchains
      # and runtime archives to package as sidecars (§11.1, §13.5).
      - name: Fetch pinned toolchain (Windows and Linux, for embedded native-link assets)
        if: startsWith(matrix.target, 'windows') || startsWith(matrix.target, 'linux')
        shell: pwsh
        run: |
          & .\scripts\fetch-toolchain.ps1 `
            -ManifestPath "packaging\toolchains\${{ matrix.target }}.json" `
            -Destination "build\toolchain-${{ matrix.target }}" `
            -DownloadDir (Join-Path $env:RUNNER_TEMP 'toolchain-downloads')

      - name: Fetch aarch64 and riscv64 toolchains (Linux x86_64 only, for cross-linker sidecars)
        if: matrix.target == 'linux-x86_64'
        shell: pwsh
        run: |
          & .\scripts\fetch-toolchain.ps1 `
            -ManifestPath "packaging\toolchains\linux-aarch64.json" `
            -Destination "build\toolchain-linux-aarch64" `
            -DownloadDir (Join-Path $env:RUNNER_TEMP 'toolchain-downloads')
          & .\scripts\fetch-toolchain.ps1 `
            -ManifestPath "packaging\toolchains\linux-riscv64.json" `
            -Destination "build\toolchain-linux-riscv64" `
            -DownloadDir (Join-Path $env:RUNNER_TEMP 'toolchain-downloads')

      - name: Build runtime archives with native shim baked in (Windows and Linux)
        if: startsWith(matrix.target, 'windows') || startsWith(matrix.target, 'linux')
        shell: pwsh
        run: |
          $manifestPath = "packaging\toolchains\${{ matrix.target }}.json"
          $manifest = Get-Content $manifestPath -Raw | ConvertFrom-Json -AsHashtable
          $runtimeToolchain = $manifest['toolchain']['runtime']
          $toolchainDir = "build\toolchain-${{ matrix.target }}"
          $target = '${{ matrix.target }}'
          if ($target -in @('linux-x86_64', 'linux-aarch64', 'linux-riscv64') -and
              -not (Test-Path "packaging\prebuilt\$target\libbearssl.a" -PathType Leaf)) {
            throw "Linux release archives for $target require packaging\prebuilt\$target\libbearssl.a; build or restore it before releasing"
          }
          & .\scripts\build-runtime-archive.ps1 `
            -Target '${{ matrix.target }}' `
            -Mode all `
            -CC (Join-Path $toolchainDir ([string]$runtimeToolchain['compiler']['path'])) `
            -AR (Join-Path $toolchainDir ([string]$runtimeToolchain['archiver']['path'])) `
            -ToolchainManifest $manifestPath `
            -OutDir "build\runtime-archives\${{ matrix.target }}"

      - name: Build aarch64 and riscv64 runtime archives (Linux x86_64 only, for cross-linker sidecars)
        if: matrix.target == 'linux-x86_64'
        shell: pwsh
        run: |
          # Build aarch64 runtime archives
          $manifestPath = "packaging\toolchains\linux-aarch64.json"
          $manifest = Get-Content $manifestPath -Raw | ConvertFrom-Json -AsHashtable
          $runtimeToolchain = $manifest['toolchain']['runtime']
          $toolchainDir = "build\toolchain-linux-aarch64"
          & .\scripts\build-runtime-archive.ps1 `
            -Target 'linux-aarch64' `
            -Mode all `
            -CC (Join-Path $toolchainDir ([string]$runtimeToolchain['compiler']['path'])) `
            -AR (Join-Path $toolchainDir ([string]$runtimeToolchain['archiver']['path'])) `
            -ToolchainManifest $manifestPath `
            -OutDir "build\runtime-archives\linux-aarch64"

          # Build riscv64 runtime archives
          $manifestPath = "packaging\toolchains\linux-riscv64.json"
          $manifest = Get-Content $manifestPath -Raw | ConvertFrom-Json -AsHashtable
          $runtimeToolchain = $manifest['toolchain']['runtime']
          $toolchainDir = "build\toolchain-linux-riscv64"
          & .\scripts\build-runtime-archive.ps1 `
            -Target 'linux-riscv64' `
            -Mode all `
            -CC (Join-Path $toolchainDir ([string]$runtimeToolchain['compiler']['path'])) `
            -AR (Join-Path $toolchainDir ([string]$runtimeToolchain['archiver']['path'])) `
            -ToolchainManifest $manifestPath `
            -OutDir "build\runtime-archives\linux-riscv64"

      - name: Stage embedded native-link assets (Windows and Linux)
        if: startsWith(matrix.target, 'windows') || startsWith(matrix.target, 'linux')
        shell: pwsh
        run: |
          & .\scripts\prepare-embed-assets.ps1 `
            -Target '${{ matrix.target }}' `
            -ToolchainDir "build\toolchain-${{ matrix.target }}" `
            -ToolchainManifest "packaging\toolchains\${{ matrix.target }}.json" `
            -OutputDir "packaging\prebuilt\${{ matrix.target }}"

      - name: Prepare cross-linker sidecars for packaging (Linux x86_64 only)
        if: matrix.target == 'linux-x86_64'
        shell: pwsh
        run: |
          # Prepare staging area for cross-linker sidecars that will be bundled
          # in the linux-x86_64 release archive (§11.1, §13.5).
          # Users can point OSCAN_NATIVE_LINKER at these to cross-compile.
          #
          # Bugfix (coordinator, post-live-validation): the sidecar directory
          # must also ship the target's freestanding runtime archive
          # (libosc_runtime_freestanding_core.a/libosc_runtime_freestanding.a),
          # not just the ld binary. --backend native cross-linking needs
          # BOTH an OSCAN_NATIVE_LINKER-compatible linker AND an
          # OSCAN_RUNTIME_ARCHIVE_DIR pointing at a matching-target runtime
          # archive (src/backend/link/archive.rs); without the archive
          # co-packaged, a user with only this release bundle had no way to
          # supply one and the "point OSCAN_NATIVE_LINKER at these to
          # cross-compile" comment above was not actually achievable from
          # the shipped bundle alone. Verified live: cross-linked +
          # qemu-executed a real program using ONLY files from a directory
          # laid out exactly like $sidecarBase\linux-{aarch64,riscv64}\ below.
          $sidecarBase = "build\cross-linker-sidecars"
          New-Item -ItemType Directory -Path "$sidecarBase\linux-aarch64" -Force | Out-Null
          New-Item -ItemType Directory -Path "$sidecarBase\linux-riscv64" -Force | Out-Null

          Copy-Item "build\toolchain-linux-aarch64\bin\aarch64-linux-musl-ld" "$sidecarBase\linux-aarch64\" -Force
          Copy-Item "build\toolchain-linux-riscv64\bin\riscv64-linux-musl-ld" "$sidecarBase\linux-riscv64\" -Force

          Copy-Item "build\runtime-archives\linux-aarch64\*" "$sidecarBase\linux-aarch64\" -Force
          Copy-Item "build\runtime-archives\linux-riscv64\*" "$sidecarBase\linux-riscv64\" -Force

          Write-Output "Cross-linker sidecars staged in $sidecarBase (linker + runtime archive per target)"

      - name: Build release binary
        run: cargo build --release
        env:
          OSCAN_VERSION: ${{ needs.prepare.outputs.tag }}
          # Windows and Linux x86-64 freestanding native builds embed a linker;
          # these are empty strings (no-ops for build.rs) on other targets.
          OSCAN_EMBED_ASSETS_DIR: ${{ (startsWith(matrix.target, 'windows') || startsWith(matrix.target, 'linux')) && format('{0}/packaging/prebuilt/{1}', github.workspace, matrix.target) || '' }}
          OSCAN_REQUIRE_EMBEDDED_ASSETS: ${{ (startsWith(matrix.target, 'windows') || startsWith(matrix.target, 'linux')) && '1' || '' }}

      - name: Assemble release asset
        id: assemble
        shell: pwsh
        run: |
          $outputDir = Join-Path $env:RUNNER_TEMP 'oscan-release-artifacts'
          $assembleArgs = @{
            Target = '${{ matrix.target }}'
            Version = '${{ needs.prepare.outputs.version }}'
            BinaryPath = '${{ matrix.binary_path }}'
            OutputDir = $outputDir
          }
          if ('${{ matrix.target }}'.StartsWith('windows') -or '${{ matrix.target }}'.StartsWith('linux')) {
            # Reuse the archives built above instead of assemble-release.ps1
            # re-fetching the toolchain and rebuilding them a second time.
            $assembleArgs['PrebuiltRuntimeArchiveDir'] = (Resolve-Path "build\runtime-archives\${{ matrix.target }}").Path
          }
          if ('${{ matrix.target }}' -eq 'linux-x86_64' -and (Test-Path 'build\cross-linker-sidecars')) {
            # Bundle the aarch64/riscv64 cross-linker sidecars staged above
            # (docs/design/native-link-embedding.md §11.1/§13.5) into the
            # linux-x86_64 archive so users can cross-link without an
            # external toolchain via OSCAN_NATIVE_LINKER.
            $assembleArgs['CrossLinkerSidecarDir'] = (Resolve-Path 'build\cross-linker-sidecars').Path
          }
          $archivePath = & .\scripts\assemble-release.ps1 @assembleArgs
          "archive_path=$archivePath" >> $env:GITHUB_OUTPUT

      - name: Smoke test packaged bundle
        shell: pwsh
        run: |
          $scratchDir = Join-Path $env:RUNNER_TEMP 'oscan-release-smoke-${{ matrix.target }}'
          & .\scripts\smoke-release.ps1 `
            -Target '${{ matrix.target }}' `
            -ArchivePath '${{ steps.assemble.outputs.archive_path }}' `
            -ScratchDir $scratchDir

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}-release
          path: ${{ steps.assemble.outputs.archive_path }}

      - name: Build MSI installer (Windows only)
        if: startsWith(matrix.target, 'windows')
        id: msi
        shell: pwsh
        run: |
          dotnet tool install --global wix
          $outputDir = Join-Path $env:RUNNER_TEMP 'oscan-release-artifacts'
          $stageDir = Join-Path $outputDir 'stage'
          $bundleDir = (Get-ChildItem $stageDir -Directory | Select-Object -First 1).FullName
          $msiName = 'oscan-v${{ needs.prepare.outputs.version }}-${{ matrix.target }}.msi'
          $msiPath = Join-Path $outputDir $msiName
          & .\scripts\build-msi.ps1 `
            -BundleDir $bundleDir `
            -Version '${{ needs.prepare.outputs.version }}' `
            -OutputPath $msiPath
          "msi_path=$msiPath" >> $env:GITHUB_OUTPUT

      - name: Upload MSI artifact (Windows only)
        if: startsWith(matrix.target, 'windows')
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}-msi
          path: ${{ steps.msi.outputs.msi_path }}

  checksums:
    name: Compute release checksums
    needs: package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Generate SHA256SUMS
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path upload -Force | Out-Null
          $files = Get-ChildItem -Path release-artifacts -Recurse -File | Where-Object {
            $_.Name -match '\.(zip|msi|tar\.gz|tar\.xz)$'
          } | Sort-Object Name
          if (-not $files) {
            throw 'No packaged release assets were downloaded.'
          }
          & .\scripts\write-checksums.ps1 -OutputPath upload/SHA256SUMS @($files.FullName)

      - name: Upload checksum artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-checksums
          path: upload/SHA256SUMS

  publish:
    name: Publish GitHub Release
    if: needs.prepare.outputs.should_publish == 'true'
    needs:
      - prepare
      - package
      - checksums
    runs-on: ubuntu-latest
    steps:
      - name: Download all release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Collect release files
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p upload
          find release-assets -type f \( -name '*.zip' -o -name '*.msi' -o -name '*.tar.gz' -o -name '*.tar.xz' -o -name 'SHA256SUMS' \) -exec cp {} upload/ \;

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          generate_release_notes: true
          files: upload/*
