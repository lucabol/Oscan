name: Oscan CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ─────────────────────────────────────────────
  # Verify generated docs are up to date
  # ─────────────────────────────────────────────
  docs:
    name: Update generated docs
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Regenerate builtin table
        run: python scripts/gen-builtin-table.py --inject

      - name: Regenerate Copilot instructions
        run: python scripts/gen-copilot-instructions.py --inject

      - name: Commit if changed
        run: |
          git diff --quiet README.md .github/instructions/ && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md .github/instructions/
          git commit -m "Auto-update generated docs [skip ci]"
          git push

  # ─────────────────────────────────────────────
  # Unit Tests + Integration Tests (Linux)
  # ─────────────────────────────────────────────
  linux:
    name: Linux (GCC, x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: linux-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: linux-cargo-

      - name: Build (release)
        run: cargo build --release

      - name: Run unit tests (53 tests)
        run: cargo test

      - name: Integration tests — positive (freestanding)
        shell: bash
        run: |
          set -euo pipefail
          oscan="./target/release/oscan"
          PASS=0
          FAIL=0
          TOTAL=0

          mkdir -p tests/build

          echo "=== Positive Integration Tests (Linux/GCC, freestanding) ==="
          for osc_file in tests/positive/*.osc; do
            name=$(basename "$osc_file" .osc)
            expected="tests/expected/${name}.expected"
            TOTAL=$((TOTAL + 1))

            if [ ! -f "$expected" ]; then
              echo "FAIL: $name — missing expected file"
              FAIL=$((FAIL + 1))
              continue
            fi

            # FFI tests need libc
            if echo "$name" | grep -q '^ffi'; then
              if ! "$oscan" --libc "$osc_file" -o "tests/build/${name}" 2>"tests/build/${name}.err"; then
                echo "FAIL: $name — compile error (libc)"
                cat "tests/build/${name}.err"
                FAIL=$((FAIL + 1))
                continue
              fi
            else
              if ! "$oscan" "$osc_file" -o "tests/build/${name}" 2>"tests/build/${name}.err"; then
                echo "FAIL: $name — compile error (freestanding)"
                cat "tests/build/${name}.err"
                FAIL=$((FAIL + 1))
                continue
              fi
            fi

            # Run and compare
            actual=$("./tests/build/${name}" 2>&1) || true
            expected_content=$(cat "$expected")

            if [ "$actual" = "$expected_content" ]; then
              echo "PASS: $name"
              PASS=$((PASS + 1))
            else
              echo "FAIL: $name — output mismatch"
              echo "  Expected: $(head -3 <<< "$expected_content")"
              echo "  Actual:   $(head -3 <<< "$actual")"
              FAIL=$((FAIL + 1))
            fi
          done

          echo ""
          echo "Positive: $PASS passed, $FAIL failed out of $TOTAL"
          [ $FAIL -eq 0 ]

      - name: Freestanding verification (Linux)
        shell: bash
        run: |
          set -euo pipefail
          echo "=== Freestanding Verification (Linux) ==="
          VPASS=0; VFAIL=0
          for exe in tests/build/*; do
            [ -x "$exe" ] || continue
            name=$(basename "$exe")
            # Skip FFI tests (they use libc)
            echo "$name" | grep -q '^ffi' && continue
            # Skip .c and .err files
            echo "$name" | grep -qE '\.(c|err)$' && continue

            size=$(stat -c%s "$exe")
            file_info=$(file "$exe")
            dep_ok="PASS"; stdlib_ok="PASS"

            # Check static linking
            if ! echo "$file_info" | grep -q 'statically linked'; then
              ldd_out=$(ldd "$exe" 2>&1 || true)
              if ! echo "$ldd_out" | grep -q 'not a dynamic executable'; then
                dep_ok="FAIL"
              fi
            fi

            # Check no stdlib symbols
            stdlib_count=$(strings "$exe" | grep -ciE 'libc\.so|libm\.so|glibc|__libc_start_main' || true)
            [ "$stdlib_count" -gt 0 ] && stdlib_ok="FAIL"

            if [ "$dep_ok" = "PASS" ] && [ "$stdlib_ok" = "PASS" ]; then
              echo "  PASS: $name (${size} bytes, static, no stdlib)"
              VPASS=$((VPASS + 1))
            else
              echo "  FAIL: $name (deps=$dep_ok stdlib=$stdlib_ok)"
              VFAIL=$((VFAIL + 1))
            fi
          done
          echo "Verification: $VPASS passed, $VFAIL failed"
          [ $VFAIL -eq 0 ]

      - name: Integration tests — negative
        shell: bash
        run: |
          set -euo pipefail
          oscan="./target/release/oscan"
          PASS=0
          FAIL=0
          TOTAL=0

          mkdir -p tests/build

          echo "=== Negative Integration Tests (Linux) ==="
          for osc_file in tests/negative/*.osc; do
            name=$(basename "$osc_file" .osc)
            TOTAL=$((TOTAL + 1))

            if "$oscan" "$osc_file" -o "tests/build/${name}.c" 2>/dev/null; then
              echo "FAIL: $name — should have been rejected"
              FAIL=$((FAIL + 1))
            else
              echo "PASS: $name — correctly rejected"
              PASS=$((PASS + 1))
            fi
          done

          echo ""
          echo "Negative: $PASS passed, $FAIL failed out of $TOTAL"
          [ $FAIL -eq 0 ]

      - name: Compile examples (Linux, freestanding)
        shell: bash
        run: |
          set -euo pipefail
          oscan="./target/release/oscan"
          PASS=0; FAIL=0; TOTAL=0
          mkdir -p tests/build

          echo "=== Example Compilation (Linux, compile-only) ==="
          for osc_file in examples/*.osc; do
            name=$(basename "$osc_file" .osc)
            TOTAL=$((TOTAL + 1))
            if ! "$oscan" "$osc_file" -o "tests/build/ex_${name}" 2>"tests/build/ex_${name}.err"; then
              echo "FAIL: $name — compile error"
              cat "tests/build/ex_${name}.err"
              FAIL=$((FAIL + 1))
            else
              echo "PASS: $name"
              PASS=$((PASS + 1))
            fi
          done
          echo ""
          echo "Examples: $PASS compiled, $FAIL failed out of $TOTAL"
          [ $FAIL -eq 0 ]

  # ─────────────────────────────────────────────
  # Unit Tests + Integration Tests (Windows)
  # ─────────────────────────────────────────────
  windows:
    name: Windows (MSVC + Clang, x86_64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~\.cargo\bin\
            ~\.cargo\registry\index\
            ~\.cargo\registry\cache\
            ~\.cargo\git\db\
            target\
          key: windows-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: windows-cargo-

      - name: Set up MSVC developer environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build (release)
        run: cargo build --release

      - name: Run unit tests (53 tests)
        run: cargo test

      - name: Integration tests — positive (freestanding)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Continue"
          $oscan = ".\target\release\oscan.exe"
          $Pass = 0
          $Fail = 0
          $Total = 0

          if (-not (Test-Path "tests\build")) {
            New-Item -ItemType Directory -Path "tests\build" | Out-Null
          }

          Write-Host "=== Positive Integration Tests (Windows, freestanding) ==="

          foreach ($bcFile in Get-ChildItem "tests\positive\*.osc") {
            $name = $bcFile.BaseName
            $expectedFile = "tests\expected\$name.expected"
            $Total++

            if (-not (Test-Path $expectedFile)) {
              Write-Host "FAIL: $name - missing expected file"
              $Fail++
              continue
            }

            # FFI tests need libc
            if ($name -match '^ffi') {
              & $oscan --libc $bcFile.FullName -o "tests\build\$name.exe" 2>"tests\build\$name.err"
            } else {
              & $oscan $bcFile.FullName -o "tests\build\$name.exe" 2>"tests\build\$name.err"
            }
            if ($LASTEXITCODE -ne 0) {
              Write-Host "FAIL: $name - compile error"
              if (Test-Path "tests\build\$name.err") {
                Get-Content "tests\build\$name.err"
              }
              $Fail++
              continue
            }

            # Run and compare
            $actual = & ".\tests\build\$name.exe" 2>&1 | Out-String
            $actual = $actual.TrimEnd("`r`n").TrimEnd("`n").Replace("`r`n", "`n")
            $expected = (Get-Content $expectedFile -Raw).TrimEnd("`r`n").TrimEnd("`n").Replace("`r`n", "`n")

            if ($actual -eq $expected) {
              Write-Host "PASS: $name"
              $Pass++
            } else {
              Write-Host "FAIL: $name - output mismatch"
              Write-Host "  Expected: $($expected.Split("`n")[0..2] -join ' | ')"
              Write-Host "  Actual:   $($actual.Split("`n")[0..2] -join ' | ')"
              $Fail++
            }
          }

          Write-Host ""
          Write-Host "Positive: $Pass passed, $Fail failed out of $Total"
          if ($Fail -gt 0) { exit 1 }

      - name: Freestanding verification (Windows)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Continue"
          Write-Host "=== Freestanding Verification (Windows) ==="

          # Source verification functions from test.ps1 (single source of truth)
          . .\test.ps1 -SourceOnly

          $VPass = 0; $VFail = 0

          foreach ($exe in Get-ChildItem "tests\build\*.exe") {
            $name = $exe.BaseName
            if ($name -match '^ffi') { continue }

            $r = Test-WindowsFreestanding $exe.FullName
            $depsStr = $r.DepDetail
            if (($r.DepCheck -ne 'FAIL') -and ($r.StdlibCheck -ne 'FAIL')) {
              Write-Host "  PASS: $name ($($r.Size) bytes, deps=[$depsStr], no stdlib)"
              $VPass++
            } else {
              Write-Host "  FAIL: $name (deps=$($r.DepCheck) stdlib=$($r.StdlibCheck))"
              if ($r.DepCheck -eq 'FAIL') { Write-Host "    Bad deps: $depsStr" }
              $VFail++
            }
          }
          Write-Host "Verification: $VPass passed, $VFail failed"
          if ($VFail -gt 0) { exit 1 }

      - name: Integration tests — negative
        shell: pwsh
        run: |
          $ErrorActionPreference = "Continue"
          $oscan = ".\target\release\oscan.exe"
          $Pass = 0
          $Fail = 0
          $Total = 0

          if (-not (Test-Path "tests\build")) {
            New-Item -ItemType Directory -Path "tests\build" | Out-Null
          }

          Write-Host "=== Negative Integration Tests (Windows) ==="

          foreach ($bcFile in Get-ChildItem "tests\negative\*.osc") {
            $name = $bcFile.BaseName
            $Total++

            & $oscan $bcFile.FullName -o "tests\build\$name.c" 2>$null
            if ($LASTEXITCODE -eq 0) {
              Write-Host "FAIL: $name - should have been rejected"
              $Fail++
            } else {
              Write-Host "PASS: $name - correctly rejected"
              $Pass++
            }
          }

          Write-Host ""
          Write-Host "Negative: $Pass passed, $Fail failed out of $Total"
          if ($Fail -gt 0) { exit 1 }
          exit 0

      - name: Compile examples (Windows)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Continue"
          $oscan = ".\target\release\oscan.exe"
          $Pass = 0; $Fail = 0; $Total = 0

          if (-not (Test-Path "tests\build")) {
            New-Item -ItemType Directory -Path "tests\build" | Out-Null
          }

          Write-Host "=== Example Compilation (Windows, compile-only) ==="
          foreach ($bcFile in Get-ChildItem "examples\*.osc") {
            $name = $bcFile.BaseName
            $Total++

            & $oscan $bcFile.FullName -o "tests\build\ex_$name.exe" 2>"tests\build\ex_$name.err"
            if ($LASTEXITCODE -ne 0) {
              Write-Host "FAIL: $name - compile error"
              if (Test-Path "tests\build\ex_$name.err") {
                Get-Content "tests\build\ex_$name.err"
              }
              $Fail++
            } else {
              Write-Host "PASS: $name"
              $Pass++
            }
          }

          Write-Host ""
          Write-Host "Examples: $Pass compiled, $Fail failed out of $Total"
          if ($Fail -gt 0) { exit 1 }

  # ─────────────────────────────────────────────
  # Unit Tests + Integration Tests (macOS)
  # ─────────────────────────────────────────────
  macos:
    name: macOS (Clang, ARM64)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: macos-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: macos-cargo-

      - name: Build (release)
        run: cargo build --release

      - name: Run unit tests (53 tests)
        run: cargo test

      - name: Integration tests — positive (libc — freestanding not supported on macOS)
        shell: bash
        run: |
          set -euo pipefail
          oscan="./target/release/oscan"
          PASS=0
          FAIL=0
          TOTAL=0

          mkdir -p tests/build

          echo "=== Positive Integration Tests (macOS/Clang, libc) ==="
          for osc_file in tests/positive/*.osc; do
            name=$(basename "$osc_file" .osc)
            TOTAL=$((TOTAL + 1))

            # Use libc-specific expected output if available, otherwise default
            if [ -f "tests/expected_libc/${name}.expected" ]; then
              expected="tests/expected_libc/${name}.expected"
            elif [ -f "tests/expected/${name}.expected" ]; then
              expected="tests/expected/${name}.expected"
            else
              echo "FAIL: $name — missing expected file"
              FAIL=$((FAIL + 1))
              continue
            fi

            # All tests use --libc on macOS
            if ! "$oscan" --libc "$osc_file" -o "tests/build/${name}" 2>"tests/build/${name}.err"; then
              echo "FAIL: $name — compile error (libc)"
              cat "tests/build/${name}.err"
              FAIL=$((FAIL + 1))
              continue
            fi

            # Run and compare
            actual=$("./tests/build/${name}" 2>&1) || true
            expected_content=$(cat "$expected")

            if [ "$actual" = "$expected_content" ]; then
              echo "PASS: $name"
              PASS=$((PASS + 1))
            else
              echo "FAIL: $name — output mismatch"
              echo "  Expected: $(head -3 <<< "$expected_content")"
              echo "  Actual:   $(head -3 <<< "$actual")"
              FAIL=$((FAIL + 1))
            fi
          done

          echo ""
          echo "Positive: $PASS passed, $FAIL failed out of $TOTAL"
          [ $FAIL -eq 0 ]

      - name: Integration tests — negative
        shell: bash
        run: |
          set -euo pipefail
          oscan="./target/release/oscan"
          PASS=0
          FAIL=0
          TOTAL=0

          mkdir -p tests/build

          echo "=== Negative Integration Tests (macOS) ==="
          for osc_file in tests/negative/*.osc; do
            name=$(basename "$osc_file" .osc)
            TOTAL=$((TOTAL + 1))

            if "$oscan" "$osc_file" -o "tests/build/${name}.c" 2>/dev/null; then
              echo "FAIL: $name — should have been rejected"
              FAIL=$((FAIL + 1))
            else
              echo "PASS: $name — correctly rejected"
              PASS=$((PASS + 1))
            fi
          done

          echo ""
          echo "Negative: $PASS passed, $FAIL failed out of $TOTAL"
          [ $FAIL -eq 0 ]

      - name: Compile examples (macOS, libc)
        shell: bash
        run: |
          set -euo pipefail
          oscan="./target/release/oscan"
          PASS=0; FAIL=0; TOTAL=0
          mkdir -p tests/build

          echo "=== Example Compilation (macOS, compile-only) ==="
          for osc_file in examples/*.osc; do
            name=$(basename "$osc_file" .osc)
            TOTAL=$((TOTAL + 1))
            if ! "$oscan" --libc "$osc_file" -o "tests/build/ex_${name}" 2>"tests/build/ex_${name}.err"; then
              echo "FAIL: $name — compile error"
              cat "tests/build/ex_${name}.err"
              FAIL=$((FAIL + 1))
            else
              echo "PASS: $name"
              PASS=$((PASS + 1))
            fi
          done
          echo ""
          echo "Examples: $PASS compiled, $FAIL failed out of $TOTAL"
          [ $FAIL -eq 0 ]

  # ─────────────────────────────────────────────
  # ARM Cross-Compilation (QEMU)
  # ─────────────────────────────────────────────
  arm-qemu:
    name: Linux ARM64 (QEMU cross-compile)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install ARM64 cross-compiler and QEMU
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu qemu-user

      - name: Build oscan (host x86_64)
        run: cargo build --release

      - name: Integration tests — positive (ARM64 via QEMU, freestanding)
        shell: bash
        run: |
          set -euo pipefail
          oscan="./target/release/oscan"
          CC="aarch64-linux-gnu-gcc"
          PASS=0; FAIL=0; TOTAL=0
          mkdir -p tests/build

          for osc_file in tests/positive/*.osc; do
            name=$(basename "$osc_file" .osc)
            expected="tests/expected/${name}.expected"
            TOTAL=$((TOTAL + 1))
            [ ! -f "$expected" ] && { echo "FAIL: $name — no expected"; FAIL=$((FAIL+1)); continue; }

            # FFI tests need libc
            if echo "$name" | grep -q '^ffi'; then
              "$oscan" --libc "$osc_file" -o "tests/build/${name}.c" 2>/dev/null || { echo "FAIL: $name — transpile"; FAIL=$((FAIL+1)); continue; }
              $CC -std=c99 -static "tests/build/${name}.c" runtime/osc_runtime.c -Iruntime -Ideps/laststanding -o "tests/build/${name}" -lm 2>/dev/null || { echo "FAIL: $name — cross-compile"; FAIL=$((FAIL+1)); continue; }
            else
              "$oscan" "$osc_file" -o "tests/build/${name}.c" 2>/dev/null || { echo "FAIL: $name — transpile"; FAIL=$((FAIL+1)); continue; }
              $CC -std=gnu11 -ffreestanding -nostdlib -static -Oz -fno-builtin -fno-asynchronous-unwind-tables -fomit-frame-pointer -ffunction-sections -fdata-sections -Wl,--gc-sections,--build-id=none -s "tests/build/${name}.c" -Iruntime -Ideps/laststanding -o "tests/build/${name}" 2>/dev/null || { echo "FAIL: $name — cross-compile"; FAIL=$((FAIL+1)); continue; }
            fi

            actual=$(qemu-aarch64 "./tests/build/${name}" 2>&1) || true
            expected_content=$(cat "$expected")
            if [ "$actual" = "$expected_content" ]; then
              echo "PASS: $name (ARM64)"
              PASS=$((PASS + 1))
            else
              echo "FAIL: $name — output mismatch (ARM64)"
              echo "  Expected: $(head -3 <<< "$expected_content")"
              echo "  Actual:   $(head -3 <<< "$actual")"
              FAIL=$((FAIL + 1))
            fi
          done

          echo "ARM64 Positive: $PASS passed, $FAIL failed out of $TOTAL"
          [ $FAIL -eq 0 ]

      - name: Freestanding verification (ARM64)
        shell: bash
        run: |
          set -euo pipefail
          echo "=== Freestanding Verification (ARM64) ==="
          VPASS=0; VFAIL=0
          for exe in tests/build/*; do
            [ -f "$exe" ] || continue
            name=$(basename "$exe")
            # Skip non-binary files and FFI tests
            echo "$name" | grep -qE '\.(c|err)$' && continue
            echo "$name" | grep -q '^ffi' && continue
            # Must be an ELF file
            file "$exe" | grep -q 'ELF' || continue

            size=$(stat -c%s "$exe")
            file_info=$(file "$exe")
            dep_ok="PASS"; stdlib_ok="PASS"

            # Check static linking via file command
            if ! echo "$file_info" | grep -q 'statically linked'; then
              dep_ok="FAIL"
            fi

            # Check no stdlib symbols
            stdlib_count=$(strings "$exe" | grep -ciE 'libc\.so|libm\.so|glibc|__libc_start_main' || true)
            [ "$stdlib_count" -gt 0 ] && stdlib_ok="FAIL"

            if [ "$dep_ok" = "PASS" ] && [ "$stdlib_ok" = "PASS" ]; then
              echo "  PASS: $name (${size} bytes, static, no stdlib)"
              VPASS=$((VPASS + 1))
            else
              echo "  FAIL: $name (deps=$dep_ok stdlib=$stdlib_ok, file=$file_info)"
              VFAIL=$((VFAIL + 1))
            fi
          done
          echo "Verification: $VPASS passed, $VFAIL failed"
          [ $VFAIL -eq 0 ]

  # ─────────────────────────────────────────────
  # RISC-V Cross-Compilation (QEMU)
  # ─────────────────────────────────────────────
  riscv-qemu:
    name: Linux RISC-V64 (QEMU cross-compile)
