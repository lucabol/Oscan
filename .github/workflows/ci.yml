              echo "  Expected: $(head -3 <<< "$expected_content")"
              echo "  Actual:   $(head -3 <<< "$actual")"
              FAIL=$((FAIL + 1))
            fi
          done

          echo "RISC-V64 Positive: $PASS passed, $FAIL failed out of $TOTAL"
          [ $FAIL -eq 0 ]

      - name: Freestanding verification (RISC-V64)
        shell: bash
        run: |
          set -euo pipefail
          echo "=== Freestanding Verification (RISC-V64) ==="
          VPASS=0; VFAIL=0
          for exe in tests/build/*; do
            [ -f "$exe" ] || continue
            name=$(basename "$exe")
            # Skip non-binary files and FFI tests
            echo "$name" | grep -qE '\.(c|err)$' && continue
            echo "$name" | grep -q '^ffi' && continue
            # Must be an ELF file
            file "$exe" | grep -q 'ELF' || continue

            size=$(stat -c%s "$exe")
            file_info=$(file "$exe")
            dep_ok="PASS"; stdlib_ok="PASS"

            # Check static linking via file command
            if ! echo "$file_info" | grep -q 'statically linked'; then
              dep_ok="FAIL"
            fi

            # Check no stdlib symbols
            stdlib_count=$(strings "$exe" | grep -ciE 'libc\.so|libm\.so|glibc|__libc_start_main' || true)
            [ "$stdlib_count" -gt 0 ] && stdlib_ok="FAIL"

            if [ "$dep_ok" = "PASS" ] && [ "$stdlib_ok" = "PASS" ]; then
              echo "  PASS: $name (${size} bytes, static, no stdlib)"
              VPASS=$((VPASS + 1))
            else
              echo "  FAIL: $name (deps=$dep_ok stdlib=$stdlib_ok, file=$file_info)"
              VFAIL=$((VFAIL + 1))
            fi
          done
          echo "Verification: $VPASS passed, $VFAIL failed"
          [ $VFAIL -eq 0 ]

  # ─────────────────────────────────────────────
  # WebAssembly via WASI
  # ─────────────────────────────────────────────
  wasi:
    name: WebAssembly via WASI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install WASI SDK and wasmtime
        run: |
          # Install wasi-sdk (includes clang + sysroot)
          WASI_SDK_VERSION=25
          wget -q https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-${WASI_SDK_VERSION}/wasi-sdk-${WASI_SDK_VERSION}.0-x86_64-linux.tar.gz
          tar xzf wasi-sdk-${WASI_SDK_VERSION}.0-x86_64-linux.tar.gz
          export WASI_SDK_PATH="$(pwd)/wasi-sdk-${WASI_SDK_VERSION}.0-x86_64-linux"
          echo "WASI_SDK_PATH=$WASI_SDK_PATH" >> $GITHUB_ENV
          # Install wasmtime
          curl https://wasmtime.dev/install.sh -sSf | bash
          echo "$HOME/.wasmtime/bin" >> $GITHUB_PATH

      - name: Build oscan (host x86_64)
        run: cargo build --release

      - name: Integration tests — positive (WASI)
        shell: bash
        run: |
          set -euo pipefail
          oscan="./target/release/oscan"
          WASI_CC="${WASI_SDK_PATH}/bin/clang"
          WASI_SYSROOT="${WASI_SDK_PATH}/share/wasi-sysroot"
          PASS=0; FAIL=0; TOTAL=0
          mkdir -p tests/build

          # WASI-compatible tests only (no sockets, graphics, terminal, or process spawning)
          WASI_TESTS="hello strings arrays error_handling break_continue compound_assign
                      for_in logical nested_control order_independence top_level_const
                      type_casts spec_types_casts builtin_minmax builtin_str_join
                      builtin_path_names arena_block arena_block_return defer_basic"

          for name in $WASI_TESTS; do
            osc_file="tests/positive/${name}.osc"
            expected="tests/expected/${name}.expected"
            [ ! -f "$osc_file" ] && continue
            [ ! -f "$expected" ] && continue
            TOTAL=$((TOTAL + 1))

            # Transpile in freestanding mode (l_os.h handles WASI via its own #ifdef __wasi__)
            "$oscan" "$osc_file" -o "tests/build/${name}.c" 2>/dev/null || { echo "FAIL: $name — transpile"; FAIL=$((FAIL+1)); continue; }

            # Compile: freestanding single-TU, targeting wasm32-wasi
            # -nostdlib: l_os.h provides _start and WASI imports — skip wasi-sdk CRT
            $WASI_CC --target=wasm32-wasi --sysroot="$WASI_SYSROOT" \
              -std=gnu11 -ffreestanding -nostdlib -O2 \
              -Wno-undefined-internal -Wno-parentheses-equality \
              -Iruntime -Ideps/laststanding \
              "tests/build/${name}.c" \
              -o "tests/build/${name}.wasm" 2>&1 || { echo "FAIL: $name — compile"; FAIL=$((FAIL+1)); continue; }

            actual=$(wasmtime "tests/build/${name}.wasm" 2>&1) || true
            expected_content=$(cat "$expected")
            if [ "$actual" = "$expected_content" ]; then
              echo "PASS: $name (WASI)"
              PASS=$((PASS + 1))
            else
              echo "FAIL: $name — output mismatch (WASI)"
              echo "  Expected: $(head -3 <<< "$expected_content")"
              echo "  Actual:   $(head -3 <<< "$actual")"
              FAIL=$((FAIL + 1))
            fi
          done

          echo "WASI Positive: $PASS passed, $FAIL failed out of $TOTAL"
          [ $FAIL -eq 0 ]
