name: Oscan CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ─────────────────────────────────────────────
  # Verify generated docs are up to date
  # ─────────────────────────────────────────────
  docs:
    name: Update generated docs
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Regenerate builtin table
        run: python scripts/gen-builtin-table.py --inject

      - name: Regenerate Copilot instructions
        run: python scripts/gen-copilot-instructions.py --inject

      - name: Commit if changed
        run: |
          git diff --quiet README.md docs/builtins.md .github/instructions/ && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md docs/builtins.md .github/instructions/
          git commit -m "Auto-update generated docs [skip ci]"
          git push

  # ─────────────────────────────────────────────
  # Unit Tests + Integration Tests (Linux)
  # ─────────────────────────────────────────────
  linux:
    name: Linux (GCC, x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: linux-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: linux-cargo-

      - name: Build (release)
        run: cargo build --release

      - name: Run unit tests (53 tests)
        run: cargo test

      - name: Integration tests — positive (freestanding)
        shell: bash
        run: |
          set -euo pipefail
          oscan="./target/release/oscan"
          PASS=0
          FAIL=0
          TOTAL=0

          mkdir -p tests/build

          echo "=== Positive Integration Tests (Linux/GCC, freestanding) ==="
          for osc_file in tests/positive/*.osc; do
            name=$(basename "$osc_file" .osc)
            # Prefer libc-variant expected file when present (covers tests like
            # tls_fetch whose freestanding "ok" output requires outbound network
            # the CI runner does not provide; the libc-variant expects the
            # connect_failed fallback which also matches no-network freestanding).
            if [ -f "tests/expected_libc/${name}.expected" ]; then
              expected="tests/expected_libc/${name}.expected"
            else
              expected="tests/expected/${name}.expected"
            fi
            TOTAL=$((TOTAL + 1))

            if [ ! -f "$expected" ]; then
              echo "FAIL: $name — missing expected file"
              FAIL=$((FAIL + 1))
              continue
            fi

            # FFI tests need libc
            if echo "$name" | grep -q '^ffi'; then
              if ! "$oscan" --libc "$osc_file" -o "tests/build/${name}" 2>"tests/build/${name}.err"; then
                echo "FAIL: $name — compile error (libc)"
                cat "tests/build/${name}.err"
                FAIL=$((FAIL + 1))
                continue
              fi
            else
              if ! "$oscan" "$osc_file" -o "tests/build/${name}" 2>"tests/build/${name}.err"; then
                echo "FAIL: $name — compile error (freestanding)"
                cat "tests/build/${name}.err"
                FAIL=$((FAIL + 1))
                continue
              fi
            fi

            # Run and compare
            actual=$("./tests/build/${name}" 2>&1) || true
            expected_content=$(cat "$expected")

            if [ "$actual" = "$expected_content" ]; then
              echo "PASS: $name"
              PASS=$((PASS + 1))
            else
              echo "FAIL: $name — output mismatch"
              echo "  Expected: $(head -3 <<< "$expected_content")"
              echo "  Actual:   $(head -3 <<< "$actual")"
              FAIL=$((FAIL + 1))
            fi
          done

          echo ""
          echo "Positive: $PASS passed, $FAIL failed out of $TOTAL"
          [ $FAIL -eq 0 ]

      - name: Freestanding verification (Linux)
        shell: bash
        run: |
          set -euo pipefail
          echo "=== Freestanding Verification (Linux) ==="
          VPASS=0; VFAIL=0
          for exe in tests/build/*; do
            [ -x "$exe" ] || continue
            name=$(basename "$exe")
            # Skip FFI tests (they use libc)
            echo "$name" | grep -q '^ffi' && continue
            # Skip .c and .err files
            echo "$name" | grep -qE '\.(c|err)$' && continue

            size=$(stat -c%s "$exe")
            file_info=$(file "$exe")
            dep_ok="PASS"; stdlib_ok="PASS"

            # Check static linking
            if ! echo "$file_info" | grep -q 'statically linked'; then
              ldd_out=$(ldd "$exe" 2>&1 || true)
              if ! echo "$ldd_out" | grep -q 'not a dynamic executable'; then
                dep_ok="FAIL"
              fi
            fi

            # Check no stdlib symbols
            stdlib_count=$(strings "$exe" | grep -ciE 'libc\.so|libm\.so|glibc|__libc_start_main' || true)
            [ "$stdlib_count" -gt 0 ] && stdlib_ok="FAIL"

            if [ "$dep_ok" = "PASS" ] && [ "$stdlib_ok" = "PASS" ]; then
              echo "  PASS: $name (${size} bytes, static, no stdlib)"
              VPASS=$((VPASS + 1))
            else
              echo "  FAIL: $name (deps=$dep_ok stdlib=$stdlib_ok)"
              VFAIL=$((VFAIL + 1))
            fi
          done
          echo "Verification: $VPASS passed, $VFAIL failed"
          [ $VFAIL -eq 0 ]

      - name: Integration tests — negative
        shell: bash
        run: |
          set -euo pipefail
          oscan="./target/release/oscan"
          PASS=0
          FAIL=0
          TOTAL=0

          mkdir -p tests/build

          echo "=== Negative Integration Tests (Linux) ==="
          for osc_file in tests/negative/*.osc; do
            name=$(basename "$osc_file" .osc)
            TOTAL=$((TOTAL + 1))

            if "$oscan" "$osc_file" -o "tests/build/${name}.c" 2>/dev/null; then
              echo "FAIL: $name — should have been rejected"
              FAIL=$((FAIL + 1))
            else
              echo "PASS: $name — correctly rejected"
              PASS=$((PASS + 1))
            fi
          done

          echo ""
          echo "Negative: $PASS passed, $FAIL failed out of $TOTAL"
          [ $FAIL -eq 0 ]

      - name: Compile examples (Linux, freestanding)
        shell: bash
        run: |
          set -euo pipefail
          oscan="./target/release/oscan"
          PASS=0; FAIL=0; TOTAL=0
          mkdir -p tests/build

          echo "=== Example Compilation (Linux, compile-only) ==="
          for osc_file in examples/*.osc; do
            name=$(basename "$osc_file" .osc)
            TOTAL=$((TOTAL + 1))
            if ! "$oscan" "$osc_file" -o "tests/build/ex_${name}" 2>"tests/build/ex_${name}.err"; then
              echo "FAIL: $name — compile error"
              cat "tests/build/ex_${name}.err"
              FAIL=$((FAIL + 1))
            else
              echo "PASS: $name"
              PASS=$((PASS + 1))
            fi
          done
          echo ""
          echo "Examples: $PASS compiled, $FAIL failed out of $TOTAL"
          [ $FAIL -eq 0 ]

  # ─────────────────────────────────────────────
  # Unit Tests + Integration Tests (Windows)
  # ─────────────────────────────────────────────
  windows:
    name: Windows (MSVC + Clang, x86_64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~\.cargo\bin\
            ~\.cargo\registry\index\
            ~\.cargo\registry\cache\
            ~\.cargo\git\db\
            target\
          key: windows-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: windows-cargo-

      - name: Set up MSVC developer environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build (release)
        run: cargo build --release

      - name: Run unit tests (53 tests)
        run: cargo test

      - name: Integration tests — positive (freestanding)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Continue"
          $oscan = ".\target\release\oscan.exe"
          $Pass = 0
          $Fail = 0
          $Total = 0

          if (-not (Test-Path "tests\build")) {
            New-Item -ItemType Directory -Path "tests\build" | Out-Null
          }

          Write-Host "=== Positive Integration Tests (Windows, freestanding) ==="

          foreach ($bcFile in Get-ChildItem "tests\positive\*.osc") {
            $name = $bcFile.BaseName
            # socket_hostnames triggers a Windows Firewall popup in CI when
            # binding to a hostname; keep Linux/ARM/WSL coverage instead.
            if ($name -eq 'socket_hostnames') { continue }
            $expectedFile = "tests\expected\$name.expected"
            $Total++

            if (-not (Test-Path $expectedFile)) {
              Write-Host "FAIL: $name - missing expected file"
              $Fail++
              continue
            }

            # FFI tests need libc
            if ($name -match '^ffi') {
              & $oscan --libc $bcFile.FullName -o "tests\build\$name.exe" 2>"tests\build\$name.err"
            } else {
              & $oscan $bcFile.FullName -o "tests\build\$name.exe" 2>"tests\build\$name.err"
            }
            if ($LASTEXITCODE -ne 0) {
              Write-Host "FAIL: $name - compile error"
              if (Test-Path "tests\build\$name.err") {
                Get-Content "tests\build\$name.err"
              }
              $Fail++
              continue
            }

            # Run and compare
            $actual = & ".\tests\build\$name.exe" 2>&1 | Out-String
            $actual = $actual.TrimEnd("`r`n").TrimEnd("`n").Replace("`r`n", "`n")
            $expected = (Get-Content $expectedFile -Raw).TrimEnd("`r`n").TrimEnd("`n").Replace("`r`n", "`n")

            if ($actual -eq $expected) {
              Write-Host "PASS: $name"
              $Pass++
            } else {
              Write-Host "FAIL: $name - output mismatch"
              Write-Host "  Expected: $($expected.Split("`n")[0..2] -join ' | ')"
              Write-Host "  Actual:   $($actual.Split("`n")[0..2] -join ' | ')"
              $Fail++
            }
          }

          Write-Host ""
          Write-Host "Positive: $Pass passed, $Fail failed out of $Total"
          if ($Fail -gt 0) { exit 1 }

      - name: Freestanding verification (Windows)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Continue"
          Write-Host "=== Freestanding Verification (Windows) ==="

          # Source verification functions from test.ps1 (single source of truth)
          . .\test.ps1 -SourceOnly

          $VPass = 0; $VFail = 0

          foreach ($exe in Get-ChildItem "tests\build\*.exe") {
            $name = $exe.BaseName
            if ($name -match '^ffi') { continue }

            $r = Test-WindowsFreestanding $exe.FullName
            $depsStr = $r.DepDetail
            if (($r.DepCheck -ne 'FAIL') -and ($r.StdlibCheck -ne 'FAIL')) {
              Write-Host "  PASS: $name ($($r.Size) bytes, deps=[$depsStr], no stdlib)"
              $VPass++
            } else {
              Write-Host "  FAIL: $name (deps=$($r.DepCheck) stdlib=$($r.StdlibCheck))"
              if ($r.DepCheck -eq 'FAIL') { Write-Host "    Bad deps: $depsStr" }
              $VFail++
            }
          }
          Write-Host "Verification: $VPass passed, $VFail failed"
          if ($VFail -gt 0) { exit 1 }

      - name: Integration tests — negative
        shell: pwsh
        run: |
          $ErrorActionPreference = "Continue"
          $oscan = ".\target\release\oscan.exe"
          $Pass = 0
          $Fail = 0
          $Total = 0

          if (-not (Test-Path "tests\build")) {
            New-Item -ItemType Directory -Path "tests\build" | Out-Null
          }

          Write-Host "=== Negative Integration Tests (Windows) ==="

          foreach ($bcFile in Get-ChildItem "tests\negative\*.osc") {
            $name = $bcFile.BaseName
            $Total++

            & $oscan $bcFile.FullName -o "tests\build\$name.c" 2>$null
            if ($LASTEXITCODE -eq 0) {
              Write-Host "FAIL: $name - should have been rejected"
              $Fail++
            } else {
              Write-Host "PASS: $name - correctly rejected"
              $Pass++
            }
          }

          Write-Host ""
          Write-Host "Negative: $Pass passed, $Fail failed out of $Total"
          if ($Fail -gt 0) { exit 1 }
          exit 0

      - name: Compile examples (Windows)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Continue"
          $oscan = ".\target\release\oscan.exe"
          $Pass = 0; $Fail = 0; $Total = 0

          if (-not (Test-Path "tests\build")) {
            New-Item -ItemType Directory -Path "tests\build" | Out-Null
          }

          Write-Host "=== Example Compilation (Windows, compile-only) ==="
          foreach ($bcFile in Get-ChildItem "examples\*.osc") {
            $name = $bcFile.BaseName
            $Total++

            & $oscan $bcFile.FullName -o "tests\build\ex_$name.exe" 2>"tests\build\ex_$name.err"
            if ($LASTEXITCODE -ne 0) {
              Write-Host "FAIL: $name - compile error"
              if (Test-Path "tests\build\ex_$name.err") {
                Get-Content "tests\build\ex_$name.err"
              }
              $Fail++
            } else {
              Write-Host "PASS: $name"
              $Pass++
            }
          }

          Write-Host ""
          Write-Host "Examples: $Pass compiled, $Fail failed out of $Total"
          if ($Fail -gt 0) { exit 1 }

  # ─────────────────────────────────────────────
  # Embedded native-link assets smoke test (Windows, optional coverage).
  #
  # docs/design/native-link-embedding.md §5.5: the default `windows` job
  # above intentionally builds WITHOUT OSCAN_EMBED_ASSETS_DIR (dev/external
  # C-toolchain path), so this job is the only CI coverage for the embedded
  # path — stage the linker/import-lib/compiler-builtins asset set, build
  # with it required, then prove the resulting oscan.exe can compile+run a
  # native freestanding program with no C compiler/linker reachable on PATH.
  # This job also runs the complete C-vs-native differential suite, so it is
  # required rather than advisory coverage.
  # ─────────────────────────────────────────────
  native-link-embedding-smoke:
    name: Native link embedding smoke test (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Fetch pinned toolchain
        shell: pwsh
        run: |
          & .\scripts\fetch-toolchain.ps1 `
            -ManifestPath "packaging\toolchains\windows-x86_64.json" `
            -Destination "build\toolchain-windows-x86_64" `
            -DownloadDir (Join-Path $env:RUNNER_TEMP 'toolchain-downloads')

      - name: Build runtime archives with native shim baked in
        shell: pwsh
        run: |
          $manifestPath = "packaging\toolchains\windows-x86_64.json"
          $manifest = Get-Content $manifestPath -Raw | ConvertFrom-Json -AsHashtable
          $runtimeToolchain = $manifest['toolchain']['runtime']
          $toolchainDir = "build\toolchain-windows-x86_64"
          & .\scripts\build-runtime-archive.ps1 `
            -Target windows-x86_64 `
            -Mode all `
            -CC (Join-Path $toolchainDir ([string]$runtimeToolchain['compiler']['path'])) `
            -AR (Join-Path $toolchainDir ([string]$runtimeToolchain['archiver']['path'])) `
            -ToolchainManifest $manifestPath `
            -OutDir "build\runtime-archives\windows-x86_64"

      - name: Stage embedded native-link assets
        shell: pwsh
        run: |
          & .\scripts\prepare-embed-assets.ps1 `
            -Target windows-x86_64 `
            -ToolchainDir "build\toolchain-windows-x86_64" `
            -ToolchainManifest "packaging\toolchains\windows-x86_64.json" `
            -OutputDir "packaging\prebuilt\windows-x86_64"

      - name: Build with embedded native-link assets required
        run: cargo build --release
        env:
          OSCAN_EMBED_ASSETS_DIR: ${{ github.workspace }}\packaging\prebuilt\windows-x86_64
          OSCAN_REQUIRE_EMBEDDED_ASSETS: "1"

      - name: Native hello smoke test (compiler/linker blocked on PATH)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          if (-not (Test-Path "tests\build")) {
            New-Item -ItemType Directory -Path "tests\build" | Out-Null
          }

          # Restrict PATH to a minimal, compiler-free set so a successful
          # native build/link here can only have used this oscan.exe's
          # embedded linker, never an external cc/gcc/clang/cl.
          $env:PATH = @(
            "$env:SystemRoot\System32",
            "$env:SystemRoot",
            "$env:SystemRoot\System32\WindowsPowerShell\v1.0"
          ) -join ';'
          foreach ($blocked in @('cc.exe', 'gcc.exe', 'clang.exe', 'cl.exe', 'clang-cl.exe')) {
            $found = Get-Command $blocked -ErrorAction SilentlyContinue
            if ($found) {
              throw "expected '$blocked' to be unreachable on the blocked PATH, but found $($found.Source)"
            }
          }

          & ".\target\release\oscan.exe" examples\hello.osc -o "tests\build\embed_hello.exe"
          if ($LASTEXITCODE -ne 0) {
            throw "native build using the embedded linker failed with exit code $LASTEXITCODE"
          }

          $actual = & ".\tests\build\embed_hello.exe" 2>&1 | Out-String
          Write-Host "hello.osc output: $actual"

      - name: Native hello true-isolation test (toolchain dir renamed away)
        shell: pwsh
        run: |
          # docs/design/native-link-embedding.md §9 item 1a: file-hash
          # equality of the extracted linker is necessary but NOT sufficient,
          # because ld.lld.exe is dynamically linked against 5 sibling DLLs.
          # PATH-stubbing cc/gcc/clang/cl (the step above) does not by itself
          # rule out a stray toolchain bin/ on PATH masking a
          # missing-sibling-DLL bug. This renames the whole pinned toolchain
          # directory away (self-contained try/finally) and re-proves the
          # embedded link end to end.
          .\tests\native_link_isolation.tests.ps1 -Oscan ".\target\release\oscan.exe"

      - name: Full C vs native backend differential suite
        shell: pwsh
        run: .\tests\run_tests.ps1 -Oscan ..\target\release\oscan.exe -Backend native

  # ─────────────────────────────────────────────
  # Native Link Embedding Smoke Test (Linux)
  # ─────────────────────────────────────────────
  # Mirrors the Windows native-link-embedding-smoke job: fetch the pinned musl
  # toolchain, build runtime archives with the native shim baked in, stage the
  # embedded native-link assets (just the static x86_64-linux-musl-ld linker,
  # no DLLs/import-libs/builtins), build oscan with OSCAN_REQUIRE_EMBEDDED_ASSETS,
  # then prove it can compile+run a native freestanding program with no C
  # compiler/linker reachable on PATH. This is release-critical coverage:
  # failures must block merging.
  # ─────────────────────────────────────────────
  native-link-embedding-smoke-linux:
    name: Native link embedding smoke test (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Fetch pinned toolchain
        shell: bash
        run: |
          ./scripts/fetch-toolchain.sh \
            --manifest packaging/toolchains/linux-x86_64.json \
            --destination build/toolchain-linux-x86_64 \
            --download-dir "$RUNNER_TEMP/toolchain-downloads"

      - name: Build runtime archives with native shim baked in
        shell: bash
        run: |
          manifestPath="packaging/toolchains/linux-x86_64.json"
          compilerPath=$(python3 -c "import json; m=json.load(open('$manifestPath')); print(m['toolchain']['runtime']['compiler']['path'])")
          archiverPath=$(python3 -c "import json; m=json.load(open('$manifestPath')); print(m['toolchain']['runtime']['archiver']['path'])")
          toolchainDir="build/toolchain-linux-x86_64"
          ./scripts/build-runtime-archive.sh \
            --target linux-x86_64 \
            --mode all \
            --cc "$toolchainDir/$compilerPath" \
            --ar "$toolchainDir/$archiverPath" \
            --toolchain-manifest "$manifestPath" \
            --output-dir build/runtime-archives/linux-x86_64

          # Hosted mode intentionally uses the host libc/compiler driver.
          # Rebuild that one archive with the same host Clang the full
          # differential suite will discover; the freestanding archives stay
          # pinned to musl and continue through the embedded direct linker.
          python3 scripts/release_tools.py build-runtime-archive \
            --target linux-x86_64 \
            --mode hosted \
            --cc "$(command -v clang)" \
            --ar "$(command -v ar)" \
            --out-dir build/runtime-archives/linux-x86_64

      - name: Stage embedded native-link assets
        shell: bash
        run: |
          ./scripts/prepare-embed-assets.sh \
            --target linux-x86_64 \
            --toolchain-dir build/toolchain-linux-x86_64 \
            --toolchain-manifest packaging/toolchains/linux-x86_64.json \
            --output-dir packaging/prebuilt/linux-x86_64

      - name: Build with embedded native-link assets required
        run: cargo build --release
        env:
          OSCAN_EMBED_ASSETS_DIR: ${{ github.workspace }}/packaging/prebuilt/linux-x86_64
          OSCAN_REQUIRE_EMBEDDED_ASSETS: "1"

      - name: Native hello smoke test (compiler/linker blocked on PATH)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p tests/build

          # Create a minimal PATH-prepended stub directory with failing
          # compiler/linker stubs, mirroring the Windows job's PATH restriction.
          stubDir="$PWD/tests/build/no-compiler-path"
          mkdir -p "$stubDir"
          for tool in cc gcc clang x86_64-linux-musl-gcc x86_64-linux-musl-ld ld python python3; do
            echo -e '#!/bin/sh\nexit 127' > "$stubDir/$tool"
            chmod +x "$stubDir/$tool"
          done

          # Restrict PATH to a minimal safe set plus our stub dir prepended.
          export PATH="$stubDir:/usr/bin:/bin"

          # Verify blocked tools are unreachable.
          for tool in cc gcc clang x86_64-linux-musl-ld; do
            if command -v "$tool" >/dev/null 2>&1 && [ "$(command -v "$tool")" != "$stubDir/$tool" ]; then
              echo "error: expected '$tool' to be unreachable or stubbed, but found $(command -v $tool)"
              exit 1
            fi
          done

          ./target/release/oscan examples/hello.osc -o tests/build/embed_hello
          ./tests/build/embed_hello

      - name: Verify static linking (no PT_INTERP, no dynamic section)
        shell: bash
        run: |
          set -euo pipefail
          binary="tests/build/embed_hello"
          if readelf -l "$binary" | grep -i 'interp'; then
            echo "error: $binary has a PT_INTERP segment (not static)"
            exit 1
          fi
          if readelf -d "$binary" 2>/dev/null | grep -q NEEDED; then
            echo "error: $binary has NEEDED entries (not static)"
            exit 1
          fi
          echo "$binary is statically linked (no PT_INTERP, no NEEDED entries)"

      - name: Native hello true-isolation test
        shell: pwsh
        run: ./tests/native_link_isolation_linux.tests.ps1 -Oscan ./target/release/oscan

      - name: Native asset extraction concurrency test
        shell: pwsh
        run: ./tests/native_link_concurrency_linux.tests.ps1 -Oscan ./target/release/oscan

      - name: Full C vs native backend differential suite
        shell: pwsh
        run: ./tests/run_tests.ps1 -Oscan ../target/release/oscan -Backend native

  # ─────────────────────────────────────────────
  # Native Link Embedding Smoke Test (Linux AArch64 cross)
  # ─────────────────────────────────────────────
  # Required (blocking): coordinator-verified end-to-end in a real Linux
  # environment (WSL Ubuntu 24.04) — pinned toolchain fetch, embed-asset
  # staging, freestanding_core runtime archive build with the real
  # aarch64-linux-musl cross-compiler, ElfDirect cross-link with the
  # embedded aarch64-linux-musl-ld, and qemu-aarch64 execution all
  # succeeded and produced correct output. Not flaky in practice on
  # ubuntu-latest (binfmt_misc/qemu-user-static and IA32 compat are both
  # standard on GitHub-hosted Linux runners).
  native-link-embedding-smoke-linux-aarch64:
    name: Native link embedding smoke test (Linux AArch64 cross)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install QEMU user-mode emulation
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-user-static

      - name: Fetch pinned aarch64 toolchain
        shell: bash
        run: |
          ./scripts/fetch-toolchain.sh \
            --manifest packaging/toolchains/linux-aarch64.json \
            --destination build/toolchain-linux-aarch64 \
            --download-dir "$RUNNER_TEMP/toolchain-downloads"

      - name: Build runtime archives with native shim baked in (aarch64)
        shell: bash
        run: |
          manifestPath="packaging/toolchains/linux-aarch64.json"
          compilerPath=$(python3 -c "import json; m=json.load(open('$manifestPath')); print(m['toolchain']['runtime']['compiler']['path'])")
          archiverPath=$(python3 -c "import json; m=json.load(open('$manifestPath')); print(m['toolchain']['runtime']['archiver']['path'])")
          toolchainDir="build/toolchain-linux-aarch64"
          ./scripts/build-runtime-archive.sh \
            --target linux-aarch64 \
            --mode freestanding_core \
            --cc "$toolchainDir/$compilerPath" \
            --ar "$toolchainDir/$archiverPath" \
            --toolchain-manifest "$manifestPath" \
            --output-dir build/runtime-archives/linux-aarch64

      - name: Stage embedded native-link assets (aarch64)
        shell: bash
        run: |
          ./scripts/prepare-embed-assets.sh \
            --target linux-aarch64 \
            --toolchain-dir build/toolchain-linux-aarch64 \
            --toolchain-manifest packaging/toolchains/linux-aarch64.json \
            --output-dir packaging/prebuilt/linux-aarch64

      - name: Build oscan (x86_64 host with aarch64 linker embedded)
        run: cargo build --release
        env:
          OSCAN_EMBED_ASSETS_DIR: ${{ github.workspace }}/packaging/prebuilt/linux-aarch64
          OSCAN_REQUIRE_EMBEDDED_ASSETS: "1"

      - name: Cross-codegen object-only emission for aarch64 (--backend native, no link)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p tests/build
          ./target/release/oscan examples/hello.osc \
            --backend native \
            --native-target linux-aarch64 \
            -o tests/build/hello_aarch64.o
          if ! readelf -h tests/build/hello_aarch64.o | grep -q 'REL (Relocatable file)'; then
            echo "error: hello_aarch64.o is not a relocatable ELF object"
            exit 1
          fi
          if ! readelf -h tests/build/hello_aarch64.o | grep -q 'AArch64'; then
            echo "error: hello_aarch64.o is not an AArch64 ELF object"
            exit 1
          fi
          echo "hello_aarch64.o is a valid AArch64 relocatable object"

      - name: Cross-compile hello.osc for aarch64
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p tests/build
          ./target/release/oscan examples/hello.osc \
            --backend native \
            --native-target linux-aarch64 \
            -o tests/build/hello_aarch64

      - name: Verify static linking (no PT_INTERP, no dynamic section)
        shell: bash
        run: |
          set -euo pipefail
          binary="tests/build/hello_aarch64"
          if readelf -l "$binary" | grep -i 'interp'; then
            echo "error: $binary has a PT_INTERP segment (not static)"
            exit 1
          fi
          if readelf -d "$binary" 2>/dev/null | grep -q NEEDED; then
            echo "error: $binary has NEEDED entries (not static)"
            exit 1
          fi
          if ! readelf -h "$binary" | grep -q 'AArch64'; then
            echo "error: $binary is not an AArch64 ELF"
            exit 1
          fi
          echo "$binary is statically linked AArch64 ELF (no PT_INTERP, no NEEDED entries)"

      - name: QEMU smoke test — execute hello_aarch64
        shell: bash
        run: |
          set -euo pipefail
          output=$(qemu-aarch64-static ./tests/build/hello_aarch64)
          echo "Output: $output"
          if [ "$output" != "Hello, Oscan!" ]; then
            echo "error: unexpected output from hello_aarch64"
            exit 1
          fi
          echo "✓ hello_aarch64 executed correctly via QEMU"

      # Coordinator bugfix + regression coverage: a plain host oscan build
      # (no OSCAN_EMBED_ASSETS_DIR) must be able to cross-link to
      # linux-aarch64 using ONLY an explicit OSCAN_NATIVE_LINKER +
      # OSCAN_NATIVE_LINKER_FLAVOR=elf override — this is the exact
      # "cross-linker sidecar" workflow documented in a release bundle's
      # README-install.txt (see release.yml's cross-linker-sidecar-dir
      # staging). Before this fix, the target-aware embedded-asset gate in
      # src/backend/link/mod.rs rejected this override unconditionally for
      # any non-host target, so the documented sidecar mechanism was
      # entirely non-functional. Live-verified in WSL prior to adding this
      # CI coverage.
      - name: Build plain oscan (no embedded assets) for cross-linker sidecar test
        run: cargo build --release --target-dir build/oscan-plain-target

      - name: Cross-link via OSCAN_NATIVE_LINKER sidecar override (aarch64)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p tests/build
          OSCAN_NATIVE_LINKER="$(pwd)/build/toolchain-linux-aarch64/bin/aarch64-linux-musl-ld" \
          OSCAN_NATIVE_LINKER_FLAVOR="elf" \
          OSCAN_RUNTIME_ARCHIVE_DIR="$(pwd)/build/runtime-archives/linux-aarch64" \
          ./build/oscan-plain-target/release/oscan examples/hello.osc \
            --backend native \
            --native-target linux-aarch64 \
            -o tests/build/hello_aarch64_sidecar
          if readelf -l tests/build/hello_aarch64_sidecar | grep -i 'interp'; then
            echo "error: hello_aarch64_sidecar has a PT_INTERP segment (not static)"
            exit 1
          fi
          if ! readelf -h tests/build/hello_aarch64_sidecar | grep -q 'AArch64'; then
            echo "error: hello_aarch64_sidecar is not an AArch64 ELF"
            exit 1
          fi
          output=$(qemu-aarch64-static ./tests/build/hello_aarch64_sidecar)
          echo "Output: $output"
          if [ "$output" != "Hello, Oscan!" ]; then
            echo "error: unexpected output from hello_aarch64_sidecar"
            exit 1
          fi
          echo "✓ cross-linker sidecar override (aarch64) produced a correct static executable"

  # ─────────────────────────────────────────────
  # Native Link Embedding Smoke Test (Linux RISC-V64 cross)
  # ─────────────────────────────────────────────
  # Required (blocking): coordinator-verified end-to-end in a real Linux
  # environment (WSL Ubuntu 24.04) — pinned toolchain fetch, embed-asset
